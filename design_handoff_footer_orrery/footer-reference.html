<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ancaire Labs footer, orrery close (design reference)</title>
<style>
  /* Tokens lifted from the live ancaire.ai stylesheet */
  :root{
    --surface:#0c1512; --panel:#11201b; --panel-2:#16271f;
    --ink:#e8e4d8; --ink-dim:#9fb0a4; --ink-faint:#809086; --core:#ece7da;
    --accent-text:#7cc08a;
    --rule:rgba(232,228,216,.10); --rule-strong:rgba(232,228,216,.18);
    --font-display:'Bricolage Grotesque',sans-serif; --font-sans:'Hanken Grotesk',sans-serif;
    --orrery-speed:20s; /* base period, seconds per revolution of the fastest node */
  }
  html,body{margin:0}
  body{background:var(--surface);color:var(--ink);font-family:var(--font-sans);min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end}

  .site-footer{border-top:1px solid var(--rule);position:relative;overflow:hidden}
  .site-footer .orrery{position:absolute;right:-90px;bottom:-230px;pointer-events:none}
  .site-footer .row{max-width:1180px;margin:0 auto;padding:44px 40px 34px;display:flex;align-items:flex-end;gap:32px;position:relative}
  .site-footer h3{margin:0;font-family:var(--font-display);font-weight:700;font-size:32px;letter-spacing:-.02em;line-height:1.2;color:var(--ink)}
  .site-footer h3 .dim{color:var(--ink-faint)}
  .site-footer .links{display:flex;align-items:center;gap:18px;padding-bottom:4px}
  .site-footer .links a{font-size:12px;color:var(--accent-text);text-decoration:none;transition:color .16s}
  .site-footer .links a:hover{color:var(--ink)}
  .site-footer .meta-rule{border-top:1px solid var(--rule);position:relative}
  .site-footer .meta{max-width:1180px;margin:0 auto;padding:15px 40px;display:flex;align-items:center;gap:12px}
  .site-footer .meta img{height:15px;opacity:.8}
  .site-footer .meta .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
  .site-footer .meta .sp{flex:1}
  .site-footer .meta .legal{font-size:12px;color:var(--ink-faint)}

  @keyframes ac-rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes ac-node{0%,100%{filter:drop-shadow(0 0 2px currentColor)}50%{filter:drop-shadow(0 0 8px currentColor)}}
  .orrery g{transform-origin:130px 130px}
  .orrery .orbit-1{animation:ac-rotate var(--orrery-speed) linear infinite}
  .orrery .orbit-2{animation:ac-rotate calc(var(--orrery-speed) * 1.45) linear infinite reverse}
  .orrery .orbit-3{animation:ac-rotate calc(var(--orrery-speed) * 1.9) linear infinite}
  .orrery .orbit-4{animation:ac-rotate calc(var(--orrery-speed) * 2.35) linear infinite}
  .orrery .node-1{color:#7cc08a;animation:ac-node 4.2s ease-in-out infinite}
  .orrery .node-2{color:#ff7a3d;animation:ac-node 5.1s ease-in-out infinite;animation-delay:1.3s}
  .orrery .node-3{color:#E0B458;animation:ac-node 4.7s ease-in-out infinite;animation-delay:2.6s}
  .orrery .node-4{color:#5EBFB4;animation:ac-node 5.6s ease-in-out infinite;animation-delay:.7s}
  @media (prefers-reduced-motion: reduce){.orrery g,.orrery circle{animation:none!important}}
</style>
</head>
<body>
<footer class="site-footer">
  <svg class="orrery" viewBox="0 0 260 260" fill="none" stroke="#7cc08a" width="460" height="460" aria-hidden="true">
    <circle cx="130" cy="130" r="40" stroke-opacity=".22"></circle>
    <circle cx="130" cy="130" r="74" stroke-opacity=".14"></circle>
    <circle cx="130" cy="130" r="108" stroke-opacity=".08"></circle>
    <circle cx="130" cy="130" r="4" fill="#ece7da" fill-opacity=".55" stroke="none"></circle>
    <g class="orbit-1"><circle class="node-1" cx="140.4" cy="91.4"  r="4.5" fill="#7cc08a" stroke="none"></circle></g>
    <g class="orbit-2"><circle class="node-2" cx="60.5"  cy="155.3" r="4.5" fill="#ff7a3d" stroke="none"></circle></g>
    <g class="orbit-3"><circle class="node-3" cx="38.4"  cy="72.8"  r="4.5" fill="#E0B458" stroke="none"></circle></g>
    <g class="orbit-4"><circle class="node-4" cx="199.4" cy="212.7" r="4.5" fill="#5EBFB4" stroke="none"></circle></g>
  </svg>
  <div class="row">
    <div style="flex:1">
      <h3><span class="dim">Execution, engineered.</span><br>Complexity, clarified.</h3>
    </div>
    <div class="links">
      <a href="https://ancaire.co">ancaire.co &#8599;&#xFE0E;</a>
      <a href="/privacy">Privacy policy</a>
    </div>
  </div>
  <div class="meta-rule">
    <div class="meta">
      <img src="assets/ancaire-logomark-reverse.svg" alt="Ancaire">
      <span class="label">Ancaire Labs &#183; Powered by AncaireAI</span>
      <span class="sp"></span>
      <span class="legal">&#169; 2026 Ancaire</span>
    </div>
  </div>
</footer>
</body>
</html>
